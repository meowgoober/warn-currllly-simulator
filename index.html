<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Warn currllly Simulator</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #2c2f33;
    color: white;
    text-align: center;
    padding-top: 20px;
}

/* Timer */
.timer {
    font-size: 22px;
    margin-bottom: 15px;
}

/* Button */
button {
    padding: 20px 40px;
    font-size: 20px;
    border: none;
    border-radius: 10px;
    background: #5865F2;
    color: white;
    cursor: pointer;
}
button:hover {
    background: #4752C4;
}

/* Stats */
.stats {
    margin-top: 15px;
    font-size: 18px;
}

/* Discord message */
.discord-message {
    display: none;
    align-items: flex-start;
    width: 500px;
    margin: 25px auto;
    font-family: "Segoe UI", Arial, sans-serif;
    color: #dcddde;
}

.avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    margin-right: 12px;
}

.message-content {
    text-align: left;
}

.header {
    display: flex;
    align-items: center;
    gap: 6px;
}

.username {
    color: white;
    font-weight: 600;
    font-size: 16px;
}

.bot-tag {
    background: #5865f2;
    color: white;
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 3px;
    font-weight: bold;
    display: flex;
    align-items: center;
    gap: 3px;
}

.bot-check {
    font-size: 10px;
}

.timestamp {
    color: #72767d;
    font-size: 12px;
    margin-left: 6px;
}

.message-text {
    margin-top: 2px;
    font-size: 15px;
    line-height: 1.3;
}
</style>
</head>

<body>

<div class="timer">
    ⏱ Time Left: <span id="time">600</span>s
</div>

<h1>warn "currllly" simulator</h1>
<p>warn currllly 500 times in 10 minutes!</p>

<div style="text-align: center;">
    <a href="https://github.com/meowgoober/warn-currllly-simulator">by dorkerexe. source code</a>
</div>

<div style="text-align: center;">
    <a href="https://discord.gg/PDbZ8BwKc4">join this server</a>
</div>

<button onclick="warnUser()">warn currly</button>

<div class="stats">
    <p>Warns: <span id="warns">0</span>/500</p>
    <p id="status"></p>
</div>

<!-- Fake Discord Message -->
<div id="discordMessage" class="discord-message">
    <img class="avatar" src="https://i.postimg.cc/qR441mSg/Carl-bot.png">
    
    <div class="message-content">
        <div class="header">
            <span class="username">Carl-bot</span>
            <span class="bot-tag">
                <span class="bot-check">✔</span> APP
            </span>
            <span class="timestamp">Today at <span id="timeStamp"></span></span>
        </div>
        <div id="messageText" class="message-text"></div>
    </div>
</div>

<script>
let warns = 0;
let timeLeft = 600;
let gameOver = false;

function warnUser() {
    if (gameOver) return;

    warns++;
    document.getElementById("warns").innerText = warns;

    // overlapping sound (new instance each click)
    const sound = new Audio("https://files.catbox.moe/57hyjq.mp3");
    sound.play();

    // show Discord message
    const msgBox = document.getElementById("discordMessage");
    const msgText = document.getElementById("messageText");
    const timeStamp = document.getElementById("timeStamp");

    msgBox.style.display = "flex";

    // timestamp
    const now = new Date();
    let hours = now.getHours();
    let minutes = now.getMinutes().toString().padStart(2, '0');
    let suffix = hours >= 12 ? "PM" : "AM";
    hours = hours % 12 || 12;

    timeStamp.innerText = `${hours}:${minutes} ${suffix}`;

    // message text
    msgText.innerHTML = `<strong>currllly</strong> has been warned, this is their ${warns}th warning.`;

    if (warns >= 500) {
        endGame(true);
    }
}

function endGame(win) {
    gameOver = true;
    document.getElementById("status").innerText = win 
        ? "you have warned currllly 500 times!" 
        : "times up. skill issue lmao.";
}

// countdown timer
setInterval(() => {
    if (gameOver) return;

    timeLeft--;
    document.getElementById("time").innerText = timeLeft;

    if (timeLeft <= 0) {
        endGame(false);
    }
}, 1000);
</script>

</body>
</html>
